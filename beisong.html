<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>背诵练习 App</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --success: #15803d;
      --success-soft: #dcfce7;
      --danger: #b91c1c;
      --danger-soft: #fee2e2;
      --warning: #92400e;
      --warning-soft: #fef3c7;
      --border: #e5e7eb;
      --shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      margin-bottom: 16px;
    }

    h1, h2, h3, p { margin: 0; }

    .title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .sub {
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      font-size: 18px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      background: #fff;
    }

    textarea:focus { border-color: var(--primary); }

    .btn {
      border: none;
      border-radius: 16px;
      padding: 14px 18px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      min-height: 56px;
      width: 100%;
      transition: transform 0.05s ease, opacity 0.2s ease, background 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.99); }
    .btn[disabled] { opacity: 0.55; cursor: not-allowed; }

    .btn-primary { background: var(--primary); color: #fff; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-secondary { background: #eef2ff; color: #3730a3; }
    .btn-light { background: #f3f4f6; color: #111827; }

    .stack { display: grid; gap: 12px; }
    .row-2 {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }

    .preview-list {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }

    .preview-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px 12px;
      background: #fafafa;
      font-size: 18px;
      line-height: 1.5;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 14px;
      background: #eef2ff;
      color: #3730a3;
      min-width: 96px;
    }

    .prompt-box {
      min-height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #f9fafb 100%);
      border: 1px solid var(--border);
      font-size: 34px;
      font-weight: 800;
      line-height: 1.4;
    }

    .hint {
      margin-top: 12px;
      text-align: center;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
    }

    .feedback-box {
      border-radius: 18px;
      padding: 16px;
      border: 1px solid var(--border);
      background: #fff;
      display: none;
      gap: 12px;
    }

    .feedback-box.show { display: grid; }

    .feedback-title {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .feedback-text {
      font-size: 28px;
      font-weight: 800;
      line-height: 1.5;
      word-break: break-word;
    }

    .feedback-correct { color: var(--success); }
    .feedback-wrong { color: var(--danger); }

    .reward-box {
      display: none;
      border-radius: 18px;
      padding: 16px;
      text-align: center;
      border: 1px solid #fde68a;
      background: linear-gradient(180deg, #fffbe8 0%, #fff7d6 100%);
      color: var(--warning);
      font-weight: 800;
      font-size: 28px;
      line-height: 1.5;
    }

    .reward-box.show { display: block; }

    .small-muted {
      color: var(--muted);
      font-size: 14px;
      text-align: center;
      line-height: 1.6;
    }

    .summary-stat {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .stat {
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
    }

    .stat-num { font-size: 28px; font-weight: 800; }
    .stat-label { color: var(--muted); font-size: 14px; margin-top: 4px; }

    .summary-list {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    details {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 18px;
      font-weight: 700;
    }

    summary::-webkit-details-marker { display: none; }

    .summary-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .icon-dot {
      width: 30px;
      height: 30px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      flex: 0 0 auto;
    }

    .icon-correct { background: var(--success-soft); color: var(--success); }
    .icon-wrong { background: var(--danger-soft); color: var(--danger); }

    .summary-detail {
      border-top: 1px solid var(--border);
      padding: 14px 16px 16px;
      display: grid;
      gap: 12px;
    }

    .detail-block {
      background: #fafafa;
      border-radius: 12px;
      padding: 12px;
    }

    .detail-label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 6px;
    }

    .detail-text {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.5;
      word-break: break-word;
    }

    .review-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .mini-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .footer-space { height: 10px; }

    @media (max-width: 640px) {
      .app { padding: 12px; }
      .title { font-size: 24px; }
      .prompt-box { font-size: 30px; min-height: 132px; }
      .feedback-text { font-size: 24px; }
      .reward-box { font-size: 24px; }
      .summary-stat { grid-template-columns: 1fr 1fr; }
      .row-2, .review-actions { grid-template-columns: 1fr; }
      .btn { font-size: 19px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section id="inputScreen" class="screen active">
      <div class="card">
        <div class="title">背诵练习</div>
        <p class="sub">每一行都会作为一项背诵内容。系统会忽略空行。</p>
      </div>

      <div class="card stack">
        <textarea id="sourceText" placeholder="例如：&#10;静夜思&#10;李白&#10;床前明月光&#10;疑是地上霜&#10;举头望明月&#10;低头思故乡"></textarea>
        <div class="row-2">
          <button id="parseBtn" class="btn btn-secondary">预览内容</button>
          <button id="startBtn" class="btn btn-primary">开始练习</button>
        </div>
      </div>

      <div class="card">
        <h3 style="font-size:22px;font-weight:800;margin-bottom:10px;">预览</h3>
        <p class="sub">以下会按顺序背诵。</p>
        <div id="previewList" class="preview-list"></div>
      </div>
    </section>

    <section id="practiceScreen" class="screen">
      <div class="card">
        <div class="topbar">
          <div class="status-badge" id="practiceBadge">准备中</div>
          <button id="exitBtn" class="btn btn-light" style="width:auto;min-height:44px;padding:10px 14px;font-size:16px;">退出练习</button>
        </div>
        <div id="promptBox" class="prompt-box">开始</div>
        <div class="hint" id="practiceHint">点“开始背诵”后，说完一句，系统会自动结束识别。</div>
      </div>

      <div id="rewardBox" class="reward-box"></div>

      <div class="card stack">
        <button id="recordBtn" class="btn btn-primary">开始背诵</button>
        <div id="recordInfo" class="small-muted">开始后 1 秒内按钮会暂时不可按，避免误触。</div>
      </div>

      <div id="feedbackBox" class="feedback-box card">
        <div>
          <div class="feedback-title">你刚才背的是：</div>
          <div id="recognizedText" class="feedback-text"></div>
        </div>
        <div>
          <div class="feedback-title">正确内容是：</div>
          <div id="targetText" class="feedback-text feedback-wrong"></div>
        </div>
      </div>

      <div id="confirmActions" class="card stack" style="display:none;">
        <div class="row-2">
          <button id="manualCorrectBtn" class="btn btn-success">我背对了</button>
          <button id="manualWrongBtn" class="btn btn-danger">我背错了</button>
        </div>
      </div>

      <div id="continueActions" class="card stack" style="display:none;">
        <button id="continueBtn" class="btn btn-secondary">继续</button>
      </div>
    </section>

    <section id="summaryScreen" class="screen">
      <div class="card">
        <div class="title" style="font-size:24px;">练习总结</div>
        <p class="sub">默认沿用前面的结果。家长如需调整，可展开后改判。</p>
        <div class="summary-stat">
          <div class="stat">
            <div class="stat-num" id="statTotal">0</div>
            <div class="stat-label">总项数</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="statCorrect">0</div>
            <div class="stat-label">正确</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="statWrong">0</div>
            <div class="stat-label">错误</div>
          </div>
          <div class="stat">
            <div class="stat-num" id="statBestStreak">0</div>
            <div class="stat-label">最高连胜</div>
          </div>
        </div>
      </div>

      <div id="summaryList" class="summary-list"></div>

      <div class="card stack">
        <button id="summaryExitBtn" class="btn btn-light">退出练习</button>
      </div>
      <div class="footer-space"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro@3.26.0/dist/index.js"></script>
  <script>
    const state = {
      lines: [],
      currentIndex: 0,
      mode: 'input',
      recognition: null,
      isListening: false,
      resultHandled: false,
      latestTranscript: '',
      cooldownTimer: null,
      startCooldownActive: false,
      streak: 0,
      bestStreak: 0,
      results: [],
      rewardTimer: null,
      speechSynthesisEnabled: 'speechSynthesis' in window,
      pauseForRewardMs: 1200,
    };

    const els = {
      inputScreen: document.getElementById('inputScreen'),
      practiceScreen: document.getElementById('practiceScreen'),
      summaryScreen: document.getElementById('summaryScreen'),
      sourceText: document.getElementById('sourceText'),
      parseBtn: document.getElementById('parseBtn'),
      startBtn: document.getElementById('startBtn'),
      previewList: document.getElementById('previewList'),
      practiceBadge: document.getElementById('practiceBadge'),
      promptBox: document.getElementById('promptBox'),
      practiceHint: document.getElementById('practiceHint'),
      recordBtn: document.getElementById('recordBtn'),
      recordInfo: document.getElementById('recordInfo'),
      rewardBox: document.getElementById('rewardBox'),
      feedbackBox: document.getElementById('feedbackBox'),
      recognizedText: document.getElementById('recognizedText'),
      targetText: document.getElementById('targetText'),
      confirmActions: document.getElementById('confirmActions'),
      continueActions: document.getElementById('continueActions'),
      manualCorrectBtn: document.getElementById('manualCorrectBtn'),
      manualWrongBtn: document.getElementById('manualWrongBtn'),
      continueBtn: document.getElementById('continueBtn'),
      exitBtn: document.getElementById('exitBtn'),
      summaryExitBtn: document.getElementById('summaryExitBtn'),
      statTotal: document.getElementById('statTotal'),
      statCorrect: document.getElementById('statCorrect'),
      statWrong: document.getElementById('statWrong'),
      statBestStreak: document.getElementById('statBestStreak'),
      summaryList: document.getElementById('summaryList'),
    };

    function showScreen(name) {
      state.mode = name;
      els.inputScreen.classList.toggle('active', name === 'input');
      els.practiceScreen.classList.toggle('active', name === 'practice');
      els.summaryScreen.classList.toggle('active', name === 'summary');
    }

    function parseLines() {
      return els.sourceText.value
        .split(/\r?\n/)
        .map(s => s.trim())
        .filter(Boolean);
    }

    function renderPreview() {
      const lines = parseLines();
      els.previewList.innerHTML = '';
      if (!lines.length) {
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.textContent = '还没有内容。';
        els.previewList.appendChild(div);
        return;
      }
      lines.forEach((line, idx) => {
        const div = document.createElement('div');
        div.className = 'preview-item';
        div.textContent = `${idx + 1}. ${line}`;
        els.previewList.appendChild(div);
      });
    }

    function resetPracticeData() {
      state.currentIndex = 0;
      state.results = [];
      state.streak = 0;
      state.bestStreak = 0;
      state.latestTranscript = '';
      state.resultHandled = false;
      clearTimeout(state.rewardTimer);
      stopSpeaking();
      hideReward();
      hideFeedback();
      hideConfirmAndContinue();
      safeAbortRecognition();
    }

    function startPractice() {
      const lines = parseLines();
      if (!lines.length) {
        alert('请先输入内容。');
        return;
      }
      state.lines = lines;
      resetPracticeData();
      showScreen('practice');
      renderPracticeStep();
    }

    function exitToInput() {
      safeAbortRecognition();
      stopSpeaking();
      resetPracticeData();
      showScreen('input');
      renderPreview();
    }

    function currentTarget() {
      return state.lines[state.currentIndex] || '';
    }

    function previousLinePrompt() {
      if (state.currentIndex === 0) return '开始';
      return state.lines[state.currentIndex - 1];
    }

    function renderPracticeStep() {
      state.resultHandled = false;
      state.latestTranscript = '';
      hideReward();
      hideFeedback();
      hideConfirmAndContinue();
      els.promptBox.textContent = previousLinePrompt();
      els.practiceBadge.textContent = `第 ${state.currentIndex + 1} 项 / 共 ${state.lines.length} 项`;
      els.practiceHint.textContent = '点“开始背诵”后，说完一句，系统会自动结束识别。';
      els.recordBtn.disabled = false;
      els.recordBtn.textContent = '开始背诵';
      els.recordInfo.textContent = '开始后 1 秒内按钮会暂时不可按，避免误触。';
    }

    function setListeningUI(listening) {
      state.isListening = listening;
      if (listening) {
        els.recordBtn.textContent = '正在听你背诵…';
        els.practiceHint.textContent = '请把这一句说完整。说完后系统会自动结束。';
      } else if (state.mode === 'practice' && !state.resultHandled) {
        els.recordBtn.textContent = '开始背诵';
      }
    }

    function startRecognition() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        processRecognitionResult('');
        return;
      }

      safeAbortRecognition();

      const rec = new SR();
      state.recognition = rec;
      state.resultHandled = false;
      state.latestTranscript = '';

      rec.lang = 'zh-CN';
      rec.interimResults = false;
      rec.continuous = false;
      rec.maxAlternatives = 1;

      rec.onstart = () => {
        setListeningUI(true);
      };

      rec.onresult = (event) => {
        const text = Array.from(event.results || [])
          .map(r => r[0] && r[0].transcript ? r[0].transcript : '')
          .join('')
          .trim();
        state.latestTranscript = text;
        processRecognitionResult(text);
      };

      rec.onerror = () => {
        processRecognitionResult(state.latestTranscript || '');
      };

      rec.onend = () => {
        const shouldFallback = !state.resultHandled && state.mode === 'practice';
        setListeningUI(false);
        if (shouldFallback) {
          processRecognitionResult(state.latestTranscript || '');
        }
      };

      try {
        rec.start();
      } catch (e) {
        processRecognitionResult('');
      }
    }

    function safeAbortRecognition() {
      if (state.recognition) {
        try { state.recognition.abort(); } catch (_) {}
        state.recognition = null;
      }
      setListeningUI(false);
    }

    function normalizeText(text) {
      return String(text || '')
        .replace(/[\s\u3000]/g, '')
        .replace(/[，。！？；：、“”‘’（）《》〈〉【】〔〕—…,.!?;:'"()\[\]{}<>\-]/g, '')
        .replace(/啊|嗯|呃|哦/g, '')
        .trim();
    }

    function toPinyinNoTone(text) {
      const normalized = normalizeText(text);
      if (!normalized) return '';
      try {
        if (window.pinyinPro && typeof window.pinyinPro.pinyin === 'function') {
          return window.pinyinPro.pinyin(normalized, { toneType: 'none', type: 'array' }).join(' ');
        }
      } catch (_) {}
      return '';
    }

    function autoJudge(recognized, target) {
      const a = normalizeText(recognized);
      const b = normalizeText(target);
      if (a && a === b) {
        return { pass: true, reason: 'text' };
      }
      const pa = toPinyinNoTone(recognized);
      const pb = toPinyinNoTone(target);
      if (pa && pb && pa === pb) {
        return { pass: true, reason: 'pinyin' };
      }
      return { pass: false, reason: 'manual' };
    }

    function stopSpeaking() {
      if (state.speechSynthesisEnabled) {
        window.speechSynthesis.cancel();
      }
    }

    function speakText(text, after) {
      stopSpeaking();
      if (!state.speechSynthesisEnabled) {
        setTimeout(() => after && after(), Math.max(900, text.length * 220));
        return;
      }
      const utter = new SpeechSynthesisUtterance(text);
      utter.lang = 'zh-CN';
      utter.rate = 1;
      utter.pitch = 1;
      utter.volume = 1;
      let done = false;
      const finish = () => {
        if (done) return;
        done = true;
        after && after();
      };
      utter.onend = finish;
      utter.onerror = finish;
      window.speechSynthesis.speak(utter);
      setTimeout(finish, Math.max(1300, text.length * 260));
    }

    function showReward(text) {
      els.rewardBox.textContent = text;
      els.rewardBox.classList.add('show');
    }

    function hideReward() {
      els.rewardBox.classList.remove('show');
      els.rewardBox.textContent = '';
    }

    function showFeedback(recognized, target) {
      els.feedbackBox.classList.add('show');
      els.recognizedText.textContent = recognized || '（空白）';
      els.targetText.textContent = target;
    }

    function hideFeedback() {
      els.feedbackBox.classList.remove('show');
      els.recognizedText.textContent = '';
      els.targetText.textContent = '';
    }

    function hideConfirmAndContinue() {
      els.confirmActions.style.display = 'none';
      els.continueActions.style.display = 'none';
    }

    function prepareContinueOnly() {
      els.confirmActions.style.display = 'none';
      els.continueActions.style.display = 'block';
    }

    function recordResultBase(recognized, autoReason, userDecision, finalDecision) {
      return {
        index: state.currentIndex,
        promptShown: previousLinePrompt(),
        targetText: currentTarget(),
        recognizedText: recognized,
        normalizedTarget: normalizeText(currentTarget()),
        normalizedRecognized: normalizeText(recognized),
        autoReason,
        userDecision,
        parentDecision: null,
        finalDecision,
      };
    }

    function updateBestStreak() {
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    }

    function processRecognitionResult(text) {
      if (state.resultHandled || state.mode !== 'practice') return;
      state.resultHandled = true;
      setListeningUI(false);
      const target = currentTarget();
      const judge = autoJudge(text, target);

      if (judge.pass) {
        state.streak += 1;
        updateBestStreak();
        const result = recordResultBase(text, judge.reason, 'auto_correct', 'correct');
        state.results.push(result);

        let rewardText = '正确';
        if (state.streak % 10 === 0) {
          rewardText = `${state.streak}连胜！你是最聪明的卡皮巴拉！`;
        } else if (state.streak === 3) {
          rewardText = '3连胜！你太棒了！';
        }

        showReward(rewardText);
        els.recordBtn.disabled = true;
        els.practiceHint.textContent = judge.reason === 'pinyin' ? '读音一致，自动通过。' : '自动判断正确。';
        speakText(rewardText, () => {
          if (state.mode !== 'practice') return;
          goNext();
        });
        return;
      }

      showFeedback(text, target);
      els.confirmActions.style.display = 'block';
      els.practiceHint.textContent = '请判断这次是否背对。';
      els.recordBtn.disabled = true;
    }

    function manualCorrect() {
      if (state.mode !== 'practice') return;
      const result = recordResultBase(els.recognizedText.textContent === '（空白）' ? '' : els.recognizedText.textContent, 'manual', 'manual_correct', 'correct');
      state.results.push(result);
      els.recordBtn.disabled = true;
      hideFeedback();
      hideConfirmAndContinue();
      goNext();
    }

    function manualWrong() {
      if (state.mode !== 'practice') return;
      state.streak = 0;
      const result = recordResultBase(els.recognizedText.textContent === '（空白）' ? '' : els.recognizedText.textContent, 'manual', 'manual_wrong', 'wrong');
      state.results.push(result);
      showFeedback(result.recognizedText, result.targetText);
      prepareContinueOnly();
      els.practiceHint.textContent = '已记录为错误。看完答案后点“继续”。';
    }

    function goNext() {
      if (state.currentIndex >= state.lines.length - 1) {
        renderSummary();
        showScreen('summary');
        return;
      }
      state.currentIndex += 1;
      renderPracticeStep();
    }

    function computeFinalDecision(item) {
      return item.parentDecision || item.finalDecision;
    }

    function renderSummary() {
      const finalResults = state.results.map(computeFinalDecision);
      const total = finalResults.length;
      const correct = finalResults.filter(x => x === 'correct').length;
      const wrong = total - correct;
      els.statTotal.textContent = String(total);
      els.statCorrect.textContent = String(correct);
      els.statWrong.textContent = String(wrong);
      els.statBestStreak.textContent = String(state.bestStreak);
      els.summaryList.innerHTML = '';

      state.results.forEach((item, idx) => {
        const details = document.createElement('details');
        const summary = document.createElement('summary');
        const finalDecision = computeFinalDecision(item);
        const autoText = item.autoReason === 'text'
          ? '文字一致自动通过'
          : item.autoReason === 'pinyin'
          ? '读音一致自动通过'
          : '需要手动确认';
        const userText = item.userDecision === 'auto_correct'
          ? '自动判对'
          : item.userDecision === 'manual_correct'
          ? '手动判对'
          : '手动判错';

        summary.innerHTML = `
          <div class="summary-left">
            <span class="icon-dot ${finalDecision === 'correct' ? 'icon-correct' : 'icon-wrong'}">${finalDecision === 'correct' ? '✔' : '✘'}</span>
            <span>第 ${idx + 1} 项</span>
          </div>
          <span class="mini-note">点开看详情</span>
        `;

        const detail = document.createElement('div');
        detail.className = 'summary-detail';
        detail.innerHTML = `
          <div class="detail-block">
            <div class="detail-label">正确内容</div>
            <div class="detail-text">${escapeHtml(item.targetText)}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">识别内容</div>
            <div class="detail-text">${escapeHtml(item.recognizedText || '（空白）')}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">自动判断</div>
            <div class="detail-text">${autoText}</div>
          </div>
          <div class="detail-block">
            <div class="detail-label">当时结果</div>
            <div class="detail-text">${userText}</div>
          </div>
        `;

        const actions = document.createElement('div');
        actions.className = 'review-actions';
        const btnCorrect = document.createElement('button');
        btnCorrect.className = 'btn btn-success';
        btnCorrect.textContent = '改为正确';
        btnCorrect.style.minHeight = '48px';
        btnCorrect.style.fontSize = '17px';
        const btnWrong = document.createElement('button');
        btnWrong.className = 'btn btn-danger';
        btnWrong.textContent = '改为错误';
        btnWrong.style.minHeight = '48px';
        btnWrong.style.fontSize = '17px';
        btnCorrect.addEventListener('click', () => {
          item.parentDecision = 'correct';
          renderSummary();
        });
        btnWrong.addEventListener('click', () => {
          item.parentDecision = 'wrong';
          renderSummary();
        });

        const note = document.createElement('div');
        note.className = 'mini-note';
        note.textContent = item.parentDecision
          ? `家长已改判：${item.parentDecision === 'correct' ? '正确' : '错误'}`
          : '未改判时，默认沿用前面的结果。';

        actions.appendChild(btnCorrect);
        actions.appendChild(btnWrong);
        detail.appendChild(actions);
        detail.appendChild(note);
        details.appendChild(summary);
        details.appendChild(detail);
        els.summaryList.appendChild(details);
      });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    els.parseBtn.addEventListener('click', renderPreview);
    els.startBtn.addEventListener('click', startPractice);
    els.exitBtn.addEventListener('click', exitToInput);
    els.summaryExitBtn.addEventListener('click', exitToInput);
    els.manualCorrectBtn.addEventListener('click', manualCorrect);
    els.manualWrongBtn.addEventListener('click', manualWrong);
    els.continueBtn.addEventListener('click', goNext);

    els.recordBtn.addEventListener('click', () => {
      if (state.startCooldownActive || state.isListening || state.mode !== 'practice') return;
      state.startCooldownActive = true;
      els.recordBtn.disabled = true;
      els.recordInfo.textContent = '刚开始识别，请稍等 1 秒。';
      startRecognition();
      clearTimeout(state.cooldownTimer);
      state.cooldownTimer = setTimeout(() => {
        state.startCooldownActive = false;
        if (!state.isListening && !state.resultHandled && state.mode === 'practice') {
          els.recordBtn.disabled = false;
          els.recordInfo.textContent = '如需重新识别，可再次点“开始背诵”。';
        } else if (state.isListening) {
          els.recordInfo.textContent = '正在识别中，说完后会自动结束。';
        }
      }, 1000);
    });

    document.addEventListener('visibilitychange', () => {
      if (document.hidden && state.isListening) {
        safeAbortRecognition();
      }
    });

    renderPreview();
  </script>
</body>
</html>
