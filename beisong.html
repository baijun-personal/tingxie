<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>中文背诵练习</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --primary: #111827;
      --ok: #0f8a35;
      --bad: #b42318;
      --warn: #9a6700;
      --soft: #f3f4f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 16px;
      font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
    }
    h1, h2, h3, p { margin: 0; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }
    .twoCol {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 980px) {
      .twoCol { grid-template-columns: 1fr 1.15fr; }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.03);
    }
    .muted { color: var(--muted); font-size: 13px; }
    .pill {
      display: inline-block;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      background: #fff;
    }
    textarea, input[type="text"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
    }
    textarea { min-height: 220px; resize: vertical; }
    button {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .hidden { display: none !important; }
    .sectionTitle { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
    .previewList, .summaryList {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .previewItem, .summaryItem {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      background: #fafafa;
      padding: 10px 12px;
    }
    .previewIndex, .summaryIndex {
      min-width: 54px;
      font-size: 12px;
      color: var(--muted);
      flex: 0 0 auto;
      padding-top: 6px;
    }
    .previewRow, .summaryHead {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .stageWrap {
      min-height: 420px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 16px;
    }
    .promptBox {
      border: 1px dashed #d1d5db;
      border-radius: 16px;
      background: #fbfbfc;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      text-align: center;
    }
    .promptText {
      font-size: 34px;
      line-height: 1.4;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .statusBlock {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      background: #fafafa;
      padding: 14px;
    }
    .recognizedText, .answerText {
      font-size: 30px;
      line-height: 1.5;
      margin-top: 6px;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .ok { color: var(--ok); }
    .bad { color: var(--bad); }
    .warn { color: var(--warn); }
    details summary { cursor: pointer; user-select: none; }
    .summaryMeta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }
    .detailBox {
      margin-top: 10px;
      border-top: 1px solid #e5e7eb;
      padding-top: 10px;
      display: grid;
      gap: 8px;
    }
    .detailRow { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .summaryBadge {
      font-size: 13px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #e5e7eb;
      background: #fff;
    }
    .footerActions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      background: rgba(17, 24, 39, .92);
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      transition: opacity .18s ease;
      max-width: 92vw;
      z-index: 1000;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="row">
      <h1>中文背诵练习（网页单文件版）</h1>
      <span id="modePill" class="pill">模式：输入</span>
    </div>
    <button id="exitBtn" class="hidden">退出练习</button>
  </div>

  <div class="twoCol">
    <div class="card" id="inputCard">
      <div class="sectionTitle">1) 内容输入</div>
      <div class="muted">每个非空行都会成为一个背诵项。第一项提示显示“开始”，从第二项起只显示前一项原文。</div>
      <textarea id="inputText" placeholder="静夜思&#10;李白&#10;床前明月光&#10;疑是地上霜&#10;举头望明月&#10;低头思故乡"></textarea>
      <div class="row" style="margin-top:10px;">
        <button class="primary" id="previewBtn">检查格式</button>
        <button id="startBtn">开始练习</button>
        <button id="clearBtn">清空</button>
      </div>
      <div id="parseInfo" class="muted" style="margin-top:10px;"></div>
      <div id="previewWrap" class="previewList"></div>
    </div>

    <div class="card hidden" id="practiceCard">
      <div class="sectionTitle">2) 练习区</div>
      <div class="stageWrap">
        <div>
          <div class="row" style="justify-content:space-between; margin-bottom:10px;">
            <div class="row">
              <span id="progressPill" class="pill">未开始</span>
              <span id="scorePill" class="pill">正确：-</span>
            </div>
          </div>

          <div class="promptBox">
            <div id="promptText" class="promptText muted">请先在左侧输入内容，再开始练习。</div>
          </div>

          <div id="resultBlock" class="statusBlock hidden" style="margin-top:14px;">
            <div id="resultTitle" class="sectionTitle" style="font-size:15px; margin-bottom:4px;">结果</div>
            <div class="muted">你刚才背的是：</div>
            <div id="recognizedText" class="recognizedText"></div>
            <div class="muted" style="margin-top:10px;">正确内容是：</div>
            <div id="answerText" class="answerText"></div>
          </div>

          <div id="flashBlock" class="statusBlock hidden" style="margin-top:14px;">
            <div id="flashText" class="recognizedText"></div>
          </div>

          <div id="summaryBlock" class="hidden" style="margin-top:14px;">
            <div class="sectionTitle">本次总结</div>
            <div id="summaryStats" class="muted"></div>
            <div id="summaryList" class="summaryList"></div>
          </div>
        </div>

        <div>
          <div id="actionRow" class="row">
            <button class="primary" id="listenBtn">开始背诵</button>
            <button id="continueBtn" class="hidden">继续</button>
            <button id="userCorrectBtn" class="hidden">我背对了</button>
            <button id="userWrongBtn" class="hidden">我背错了</button>
            <button id="restartBtn" class="hidden">重新开始</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    (() => {
      const $ = (id) => document.getElementById(id);

      const els = {
        modePill: $('modePill'),
        exitBtn: $('exitBtn'),
        inputText: $('inputText'),
        previewBtn: $('previewBtn'),
        startBtn: $('startBtn'),
        clearBtn: $('clearBtn'),
        parseInfo: $('parseInfo'),
        previewWrap: $('previewWrap'),
        inputCard: $('inputCard'),
        practiceCard: $('practiceCard'),
        progressPill: $('progressPill'),
        scorePill: $('scorePill'),
        promptText: $('promptText'),
        resultBlock: $('resultBlock'),
        resultTitle: $('resultTitle'),
        recognizedText: $('recognizedText'),
        answerText: $('answerText'),
        flashBlock: $('flashBlock'),
        flashText: $('flashText'),
        summaryBlock: $('summaryBlock'),
        summaryStats: $('summaryStats'),
        summaryList: $('summaryList'),
        listenBtn: $('listenBtn'),
        continueBtn: $('continueBtn'),
        userCorrectBtn: $('userCorrectBtn'),
        userWrongBtn: $('userWrongBtn'),
        restartBtn: $('restartBtn')
      };

      const STORAGE_KEY = 'recitation_app_single_file_v1';
      const PAUSE_WORDS = ['啊', '嗯', '呃', '哦'];
      const PUNCT_RE = /[\s\u3000，。,．、；：？！!?,“”"'‘’（）()《》〈〉【】\[\]…—-]/g;

      const state = {
        items: [],
        currentIndex: 0,
        results: [],
        mode: 'input', // input | practicing | confirming | wrong_wait_continue | summary
        recognition: null,
        isListening: false,
        speechApiSupported: false,
        sessionId: null,
        recognitionHandled: false,
        recognitionFallbackTimer: null,
        suppressNextError: false
      };

      function uid() {
        return 's_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      }

      function normalizeText(text) {
        let s = String(text || '');
        s = s.replace(PUNCT_RE, '');
        for (const word of PAUSE_WORDS) {
          s = s.split(word).join('');
        }
        return s.trim();
      }

      function parseLines(raw) {
        return String(raw || '')
          .split(/\r?\n/)
          .map(s => s.trim())
          .filter(Boolean)
          .map((text, index) => ({ id: 'item_' + (index + 1), index, text }));
      }

      function saveInputDraft() {
        const payload = { rawText: els.inputText.value || '' };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
      }

      function loadInputDraft() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const data = JSON.parse(raw);
          if (data && typeof data.rawText === 'string') {
            els.inputText.value = data.rawText;
          }
        } catch (_) {}
      }


      function showInputPage() {
        els.inputCard.classList.remove('hidden');
        els.practiceCard.classList.add('hidden');
      }

      function showPracticePage() {
        els.inputCard.classList.add('hidden');
        els.practiceCard.classList.remove('hidden');
      }

      function showToast(msg) {
        const toast = els.toast || document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(showToast.timer);
        showToast.timer = setTimeout(() => toast.classList.remove('show'), 1800);
      }

      function renderPreview() {
        const items = parseLines(els.inputText.value);
        els.previewWrap.innerHTML = '';
        els.parseInfo.textContent = items.length
          ? `共识别到 ${items.length} 个背诵项。你可以直接改下面的内容。`
          : '还没有可用内容。';
        items.forEach((item, i) => {
          const row = document.createElement('div');
          row.className = 'previewItem';
          row.innerHTML = `
            <div class="previewRow">
              <div class="previewIndex">第 ${i + 1} 项</div>
              <div style="flex:1;">
                <input type="text" value="${escapeHtml(item.text)}" data-preview-index="${i}" />
              </div>
            </div>
          `;
          els.previewWrap.appendChild(row);
        });

        els.previewWrap.querySelectorAll('input[data-preview-index]').forEach(input => {
          input.addEventListener('input', () => {
            const current = parseLines(els.inputText.value);
            const idx = Number(input.dataset.previewIndex);
            if (!Number.isInteger(idx) || !current[idx]) return;
            current[idx].text = input.value.trim();
            els.inputText.value = current.map(x => x.text).filter(Boolean).join('\n');
            saveInputDraft();
          });
        });
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function computeDisplayPrompt() {
        if (state.mode === 'summary') return '练习已完成';
        if (!state.items.length) return '请先在左侧输入内容，再开始练习。';
        if (state.currentIndex === 0) return '开始';
        const prev = state.items[state.currentIndex - 1];
        return prev ? prev.text : '开始';
      }

      function currentItem() {
        return state.items[state.currentIndex] || null;
      }

      function updateScorePill() {
        let finalCorrect = 0;
        let counted = 0;
        for (const r of state.results) {
          if (!r) continue;
          const finalResult = r.parentDecision ?? r.userDecision ?? null;
          if (!finalResult) continue;
          counted += 1;
          if (finalResult === 'correct') finalCorrect += 1;
        }
        els.scorePill.textContent = counted ? `正确：${finalCorrect}/${counted}` : '正确：-';
      }

      function updateProgressPill() {
        if (state.mode === 'summary') {
          els.progressPill.textContent = `已完成 ${state.items.length}/${state.items.length}`;
          return;
        }
        if (!state.items.length) {
          els.progressPill.textContent = '未开始';
          return;
        }
        const current = Math.min(state.currentIndex + 1, state.items.length);
        els.progressPill.textContent = `第 ${current} 项 / 共 ${state.items.length} 项`;
      }

      function hideIntermediateBlocks() {
        els.resultBlock.classList.add('hidden');
        els.flashBlock.classList.add('hidden');
      }

      function setButtonsForMode() {
        const isNotInput = state.mode !== 'input';
        els.exitBtn.classList.toggle('hidden', !isNotInput);
        els.restartBtn.classList.toggle('hidden', !isNotInput);
        els.summaryBlock.classList.toggle('hidden', state.mode !== 'summary');

        els.listenBtn.classList.add('hidden');
        els.continueBtn.classList.add('hidden');
        els.userCorrectBtn.classList.add('hidden');
        els.userWrongBtn.classList.add('hidden');

        if (state.mode === 'practicing') {
          els.listenBtn.classList.remove('hidden');
          els.listenBtn.textContent = state.isListening ? '停止录音' : '开始背诵';
        } else if (state.mode === 'confirming') {
          els.userCorrectBtn.classList.remove('hidden');
          els.userWrongBtn.classList.remove('hidden');
        } else if (state.mode === 'wrong_wait_continue') {
          els.continueBtn.classList.remove('hidden');
        } else if (state.mode === 'summary') {
          // only restart + exit visible
        }
      }

      function renderPrompt() {
        els.promptText.textContent = computeDisplayPrompt();
      }

      function applyModePill() {
        const map = {
          input: '模式：输入',
          practicing: '模式：练习',
          confirming: '模式：确认',
          wrong_wait_continue: '模式：查看答案',
          summary: '模式：总结'
        };
        els.modePill.textContent = map[state.mode] || '模式：输入';
      }

      function renderAll() {
        if (state.mode === 'input') showInputPage();
        else showPracticePage();
        applyModePill();
        renderPrompt();
        updateProgressPill();
        updateScorePill();
        setButtonsForMode();
      }

      function beginPractice() {
        const items = parseLines(els.inputText.value);
        if (!items.length) {
          showToast('请先输入至少一行内容');
          return;
        }
        stopRecognitionIfNeeded();
        state.items = items;
        state.currentIndex = 0;
        state.results = items.map(item => ({
          itemId: item.id,
          index: item.index,
          targetText: item.text,
          normalizedTarget: normalizeText(item.text),
          recognizedText: '',
          normalizedRecognized: '',
          autoPass: false,
          autoDecision: null,
          userDecision: null,
          parentDecision: null,
          status: 'pending'
        }));
        state.mode = 'practicing';
        state.sessionId = uid();
        hideIntermediateBlocks();
        els.summaryBlock.classList.add('hidden');
        renderAll();
      }

      function restartPractice() {
        if (!state.items.length) {
          beginPractice();
          return;
        }
        stopRecognitionIfNeeded();
        state.currentIndex = 0;
        state.results = state.items.map(item => ({
          itemId: item.id,
          index: item.index,
          targetText: item.text,
          normalizedTarget: normalizeText(item.text),
          recognizedText: '',
          normalizedRecognized: '',
          autoPass: false,
          autoDecision: null,
          userDecision: null,
          parentDecision: null,
          status: 'pending'
        }));
        state.mode = 'practicing';
        hideIntermediateBlocks();
        els.summaryBlock.classList.add('hidden');
        renderAll();
      }

      function exitPractice() {
        stopRecognitionIfNeeded();
        state.currentIndex = 0;
        state.results = [];
        state.mode = 'input';
        hideIntermediateBlocks();
        els.summaryBlock.classList.add('hidden');
        renderAll();
      }


      function clearRecognitionFallbackTimer() {
        if (state.recognitionFallbackTimer) {
          clearTimeout(state.recognitionFallbackTimer);
          state.recognitionFallbackTimer = null;
        }
      }

      function stopRecognitionIfNeeded() {
        clearRecognitionFallbackTimer();
        if (state.recognition && state.isListening) {
          state.suppressNextError = true;
          try { state.recognition.stop(); } catch (_) {}
        }
        state.isListening = false;
      }

      function setupSpeechRecognition() {
        const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SR) {
          state.speechApiSupported = false;
          return;
        }
        state.speechApiSupported = true;
        const rec = new SR();
        rec.lang = 'zh-CN';
        rec.interimResults = false;
        rec.maxAlternatives = 1;
        rec.continuous = false;

        rec.onstart = () => {
          state.isListening = true;
          state.recognitionHandled = false;
          renderAll();
        };

        rec.onend = () => {
          const wasListening = state.isListening;
          state.isListening = false;
          clearRecognitionFallbackTimer();
          if (wasListening && state.mode === 'practicing' && !state.recognitionHandled) {
            processRecognitionResult('');
          }
          if (state.mode === 'practicing') renderAll();
        };

        rec.onerror = (event) => {
          const code = event && event.error ? event.error : '识别失败';
          const shouldIgnore = state.suppressNextError && (code === 'aborted' || code === 'no-speech');
          state.suppressNextError = false;
          state.isListening = false;
          clearRecognitionFallbackTimer();
          if (!shouldIgnore && state.mode === 'practicing' && !state.recognitionHandled) {
            processRecognitionResult('');
            showToast('识别状态：' + code);
          } else {
            renderAll();
          }
        };

        rec.onresult = (event) => {
          let text = '';
          try {
            text = Array.from(event.results)
              .map(r => r[0] && r[0].transcript ? r[0].transcript : '')
              .join('')
              .trim();
          } catch (_) {}
          state.recognitionHandled = true;
          processRecognitionResult(text);
        };

        state.recognition = rec;
      }

      function startListening() {
        if (state.mode !== 'practicing') return;
        if (!currentItem()) return;
        hideIntermediateBlocks();
        if (!state.speechApiSupported || !state.recognition) {
          const text = prompt('当前浏览器不支持语音识别，请手动输入你刚才背诵的内容：', '') ?? '';
          processRecognitionResult(text.trim());
          return;
        }
        try {
          state.recognitionHandled = false;
          state.suppressNextError = false;
          clearRecognitionFallbackTimer();
          state.recognition.start();
          state.recognitionFallbackTimer = setTimeout(() => {
            if (state.isListening) {
              stopRecognitionIfNeeded();
            }
          }, 8000);
        } catch (_) {
          showToast('录音暂时无法启动，请再点一次');
        }
      }

      function processRecognitionResult(text) {
        const item = currentItem();
        if (!item) return;
        const recognized = String(text || '').trim();
        const normalizedRecognized = normalizeText(recognized);
        const normalizedTarget = normalizeText(item.text);
        const autoPass = normalizedRecognized === normalizedTarget;

        const result = state.results[state.currentIndex];
        result.recognizedText = recognized;
        result.normalizedRecognized = normalizedRecognized;
        result.autoPass = autoPass;
        result.autoDecision = autoPass ? 'auto_pass' : 'needs_confirm';
        result.targetText = item.text;
        result.normalizedTarget = normalizedTarget;

        if (autoPass) {
          result.userDecision = 'correct';
          result.status = 'done';
          els.flashBlock.classList.remove('hidden');
          els.flashText.className = 'recognizedText ok';
          els.flashText.textContent = '正确';
          els.resultBlock.classList.add('hidden');
          advanceAfterHandled();
          return;
        }

        els.flashBlock.classList.add('hidden');
        els.resultBlock.classList.remove('hidden');
        els.resultTitle.textContent = '请确认';
        els.recognizedText.textContent = recognized || '（空白）';
        els.answerText.textContent = item.text;
        state.mode = 'confirming';
        renderAll();
      }

      function markCurrentAsCorrectByUser() {
        const result = state.results[state.currentIndex];
        if (!result) return;
        result.userDecision = 'correct';
        result.status = 'done';
        hideIntermediateBlocks();
        advanceAfterHandled();
      }

      function markCurrentAsWrongByUser() {
        const result = state.results[state.currentIndex];
        const item = currentItem();
        if (!result || !item) return;
        result.userDecision = 'wrong';
        result.status = 'done';
        els.resultBlock.classList.remove('hidden');
        els.resultTitle.textContent = '答案';
        els.recognizedText.textContent = result.recognizedText || '（空白）';
        els.answerText.textContent = item.text;
        state.mode = 'wrong_wait_continue';
        renderAll();
      }

      function advanceAfterHandled() {
        if (state.currentIndex >= state.items.length - 1) {
          enterSummary();
          return;
        }
        state.currentIndex += 1;
        state.mode = 'practicing';
        hideIntermediateBlocks();
        renderAll();
      }

      function getFinalDecision(result) {
        return result.parentDecision ?? result.userDecision ?? null;
      }

      function getDecisionLabel(result) {
        const final = getFinalDecision(result);
        return final === 'correct' ? '正确' : final === 'wrong' ? '错误' : '未处理';
      }

      function enterSummary() {
        stopRecognitionIfNeeded();
        state.mode = 'summary';
        hideIntermediateBlocks();
        renderSummary();
        renderAll();
      }

      function renderSummary() {
        const total = state.results.length;
        let correct = 0;
        let wrong = 0;
        state.results.forEach(r => {
          const final = getFinalDecision(r);
          if (final === 'correct') correct += 1;
          else if (final === 'wrong') wrong += 1;
        });
        const rate = total ? Math.round(correct / total * 100) : 0;
        els.summaryStats.textContent = `共 ${total} 项，正确 ${correct} 项，错误 ${wrong} 项，正确率 ${rate}% 。家长可以展开每项查看详情，也可以直接改判；如果不改，就沿用前面的结果。`;
        els.summaryList.innerHTML = '';

        state.results.forEach((result, idx) => {
          const item = state.items[idx];
          const final = getFinalDecision(result);
          const autoLabel = result.autoDecision === 'auto_pass' ? '自动通过' : '需确认';
          const userLabel = result.userDecision === 'correct' ? '背对了' : result.userDecision === 'wrong' ? '背错了' : '未确认';
          const parentLabel = result.parentDecision === 'correct' ? '家长改为正确' : result.parentDecision === 'wrong' ? '家长改为错误' : '家长未改';
          const icon = final === 'correct' ? '✔' : final === 'wrong' ? '✘' : '·';
          const wrapper = document.createElement('div');
          wrapper.className = 'summaryItem';
          wrapper.innerHTML = `
            <details>
              <summary>
                <div class="summaryHead">
                  <div class="summaryIndex">第 ${idx + 1} 项</div>
                  <div style="flex:1;">
                    <div>${icon} ${escapeHtml(getDecisionLabel(result))}</div>
                    <div class="summaryMeta">
                      <span class="summaryBadge">${escapeHtml(autoLabel)}</span>
                      <span class="summaryBadge">${escapeHtml(userLabel)}</span>
                      ${result.parentDecision ? `<span class="summaryBadge">${escapeHtml(parentLabel)}</span>` : ''}
                    </div>
                  </div>
                </div>
              </summary>
              <div class="detailBox">
                <div class="detailRow"><strong>正确内容：</strong>${escapeHtml(item.text)}</div>
                <div class="detailRow"><strong>识别内容：</strong>${escapeHtml(result.recognizedText || '（空白）')}</div>
                <div class="detailRow"><strong>自动判断：</strong>${escapeHtml(autoLabel)}</div>
                <div class="detailRow"><strong>用户选择：</strong>${escapeHtml(userLabel)}</div>
                <div class="detailRow"><strong>最终结果：</strong>${escapeHtml(getDecisionLabel(result))}</div>
                <div class="row" style="margin-top:4px;">
                  <button data-parent-set="correct" data-index="${idx}">改为正确</button>
                  <button data-parent-set="wrong" data-index="${idx}">改为错误</button>
                  <button data-parent-set="clear" data-index="${idx}">不修改</button>
                </div>
              </div>
            </details>
          `;
          els.summaryList.appendChild(wrapper);
        });

        els.summaryList.querySelectorAll('button[data-parent-set]').forEach(btn => {
          btn.addEventListener('click', () => {
            const idx = Number(btn.dataset.index);
            const action = btn.dataset.parentSet;
            const result = state.results[idx];
            if (!result) return;
            if (action === 'clear') result.parentDecision = null;
            else result.parentDecision = action;
            renderSummary();
            updateScorePill();
          });
        });
      }

      els.previewBtn.addEventListener('click', () => {
        saveInputDraft();
        renderPreview();
      });

      els.startBtn.addEventListener('click', () => {
        saveInputDraft();
        renderPreview();
        beginPractice();
      });

      els.clearBtn.addEventListener('click', () => {
        els.inputText.value = '';
        els.previewWrap.innerHTML = '';
        els.parseInfo.textContent = '已清空。';
        saveInputDraft();
      });

      els.inputText.addEventListener('input', saveInputDraft);

      els.listenBtn.addEventListener('click', () => {
        if (state.mode !== 'practicing') return;
        if (state.isListening) {
          stopRecognitionIfNeeded();
          return;
        }
        startListening();
      });

      els.userCorrectBtn.addEventListener('click', markCurrentAsCorrectByUser);
      els.userWrongBtn.addEventListener('click', markCurrentAsWrongByUser);
      els.continueBtn.addEventListener('click', advanceAfterHandled);
      els.restartBtn.addEventListener('click', restartPractice);
      els.exitBtn.addEventListener('click', exitPractice);

      loadInputDraft();
      renderPreview();
      setupSpeechRecognition();
      renderAll();
    })();
  </script>
</body>
</html>
