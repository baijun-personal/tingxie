<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>中文听写练习 v_fixed85</title>
  <style>

@font-face {
  font-family: "WordKaiTi";
  src: url("simkai.ttf") format("truetype");
}

    body { font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; margin: 16px; line-height: 1.45; color:#111;
      padding-bottom: env(safe-area-inset-bottom, 0px);
      padding-left: env(safe-area-inset-left, 0px);
      padding-right: env(safe-area-inset-right, 0px);
    }
    h1 { font-size: 20px; margin: 0; }
    .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
    .card { border: 1px solid #ddd; border-radius: 14px; padding: 14px; margin: 12px 0; background:#fff; }
    .twoCol { display:grid; grid-template-columns:1fr; gap:12px; }
    @media (min-width: 980px) { .twoCol { grid-template-columns: 1fr 1.2fr; } }
    textarea { width:100%; min-height:200px; padding:10px; border-radius:10px; border:1px solid #ccc; font-size:14px; }
    button { padding:10px 12px; border:1px solid #ccc; border-radius:10px; background:#fff; cursor:pointer; margin:6px 6px 0 0; }
    button.primary { border-color:#111; }
    button:disabled { opacity:.5; cursor:not-allowed; }
    .row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
    .muted { color:#666; font-size:13px; }
    .pill { display:inline-block; padding:3px 10px; border:1px solid #ddd; border-radius:999px; font-size:12px; }
    .ok { color:#0a7a0a; }
    .bad { color:#b00020; }
    .warn { color:#9a6400; }
    .hidden { display:none !important; }
    .big { font-size:28px; }
    .prompt { font-size:22px; line-height:1.5; margin-top:8px; }
     .kaitiCorrect{font-family: "WordKaiTi","KaiTi","Kaiti SC","FangSong",serif;}
.target { font-size:48px; text-align:center; line-height:1; }
    .manualCompare { display:grid; grid-template-columns:1fr 1fr; gap:12px; align-items:stretch; margin-top:12px; }
    .compareBox { border:1px solid #ddd; border-radius:12px; padding:10px; background:#fafafa; min-height:220px; display:flex; flex-direction:column; }
    .compareTitle { font-size:13px; color:#666; margin-bottom:8px; }
    .handWrap, .charWrap { flex:1; display:flex; align-items:center; justify-content:center; font-family:"WordKaiTi","KaiTi","Kaiti SC","FangSong",serif; }
    .charWrap { font-size:160px; background:#fff; border:1px solid #eee; border-radius:12px; }
    #reviewImage { max-width:100%; max-height:280px; border:1px solid #eee; border-radius:12px; background:#fff; }
    #pad { border:1px solid #ccc; border-radius:12px; background:#fff; touch-action:none; }
    #toast {
      position: fixed; left: 50%; bottom: calc(16px + env(safe-area-inset-bottom, 0px)); transform: translateX(-50%);
      background: rgba(0,0,0,0.82); color: #fff;
      padding: 10px 12px; border-radius: 12px; font-size: 13px;
      opacity: 0; pointer-events: none; transition: opacity 180ms ease; max-width: 90vw;
    }
    #toast.show { opacity: 1; }
    ul { margin:8px 0 0; padding-left:20px; }
    li { margin:4px 0; }
    body.practice #inputCard { display:none; }
    body:not(.practice) #practiceCard { display:none; }
  
    .summaryList { margin-top:12px; }
    .summaryItem { display:flex; align-items:center; gap:12px; padding:8px 0; border-top:1px solid #eee; }
    .summaryItem:first-child { border-top:none; }
    .summaryThumb { width:88px; height:88px; object-fit:contain; border:1px solid #ddd; border-radius:10px; background:#fff; flex:0 0 88px; }
    .summaryMeta { line-height:1.5; }
    .summaryChar { font-size:28px; }


    .padSuccessFlash { animation: padSuccessFlash 0.55s ease; }
    @keyframes padSuccessFlash {
      0% { box-shadow: 0 0 0 0 rgba(80, 200, 120, 0.0); border-color:#ccc; }
      25% { box-shadow: 0 0 0 6px rgba(80, 200, 120, 0.18); border-color:#7edc98; }
      100% { box-shadow: 0 0 0 0 rgba(80, 200, 120, 0.0); border-color:#ccc; }
    }

    .wrongbookBar { margin-top:14px; padding-top:12px; border-top:1px solid #eee; }
    .wrongbookList { margin-top:10px; max-height:260px; overflow:auto; border:1px solid #eee; border-radius:10px; padding:8px 10px; background:#fafafa; }
    .wrongbookRow { padding:6px 0; border-top:1px solid #eee; }
    .wrongbookRow:first-child { border-top:none; }
    .wrongbookChar { font-size:22px; display:inline-block; min-width:28px; }
    .smallInput { width:72px; padding:6px 8px; border:1px solid #ccc; border-radius:8px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="row">
      <h1>中文听写练习v_fixed85</h1>
      <span id="modePill" class="pill">模式：准备</span>
    </div>
    <button id="exitPractice" class="hidden">退出练习</button>
    <button id="fullscreenBtn" class="hidden" title="全屏">⛶</button>
  </div>

  <div class="twoCol">
    <div class="card" id="inputCard">
      <div>1) 粘贴内容</div>
      <div class="muted" style="margin-top:4px;">每行一个项目。格式示例：检查视力 1 / 表演结束 1,2,3 / 布置课堂</div>

      <textarea id="input" placeholder="检查视力 1&#10;表演结束 1,2,3&#10;布置课堂"></textarea>

      <div class="row" style="margin-top:10px;">
<label class="muted">语速
          <input id="rate" type="range" min="0.6" max="1.2" step="0.05" value="0.95" />
          <span id="rateVal" class="pill"></span>
        </label>
        <label class="muted">音高
          <input id="pitch" type="range" min="0.8" max="1.2" step="0.05" value="1.0" />
          <span id="pitchVal" class="pill"></span>
        </label>
      </div>

      <div class="row">
        <button type="button" class="primary" id="start">开始练习</button><button type="button" id="continueBtn">继续上次的练习</button><button type="button" id="startLastWrongBtn">上次错题练习</button>
        <button type="button" id="previewBtn">检查格式</button>
        <button type="button" id="lastSummaryBtn">上次总结</button>
        <button type="button" id="resetAll">清空/重置</button>
      </div>

      <div class="wrongbookBar">
        <div class="row" style="justify-content:space-between; align-items:center;">
          <div>错题本 <span id="wrongbookCount" class="pill">0 条</span></div>
          <div class="row">
            <label class="muted">抽题数
              <input id="wrongbookCountInput" class="smallInput" type="number" min="1" step="1" value="20" />
            </label>
            <button id="startWrongbookBtn">错题本练习</button>
            <button id="viewWrongbookBtn">查看</button>
            <button id="clearWrongbookBtn">清空错题本</button>
          </div>
        </div>
        <div id="wrongbookPanel" class="wrongbookList hidden"></div>
      </div>

      <div id="preview" style="margin-top:10px;"></div>
    </div>

    <div class="card" id="practiceCard">
      <div>2) 练习区</div>

      <div class="row" style="justify-content:space-between; margin-top:8px;">
        <div>
          <span id="progress" class="pill">未开始</span>
          <span id="score" class="pill">正确：-</span>
          <span id="streak" class="pill">连胜：0</span>
        </div>
      </div>

      <div id="actionStage" style="margin-top:14px;">
        <div class="row">
          <button id="replayBtn">🔊 重听</button>
          <button id="dontKnowBtn">我不会</button>
        </div>
      </div>

      <div id="writingStage" style="margin-top:14px;">
        <div class="muted" id="writingHint">请写一个字，写大一点、尽量居中。</div>
        <div id="retryHint" class="warn hidden" style="margin-top:8px;"></div>
        <div style="margin-top:8px;">
          <canvas id="pad" width="294" height="294"></canvas>
        </div>
        <div class="row" style="margin-top:8px;">
          <button id="clearPad">清空手写板</button>
          <button id="replayWriteBtn">🔊 重听</button>
          <button class="primary" id="submitOCR">提交识别</button>

        </div>
        <div id="ocrStatus" class="muted" style="margin-top:6px;"></div>
      </div>

      <div id="manualStage" class="hidden" style="margin-top:14px;">
        <div class="muted">OCR 不能确认是否正确，请手动检查。</div>
        <div class="manualCompare">
          <div class="compareBox">
            <div class="compareTitle">你写的字</div>
            <div class="handWrap"><img id="reviewImage" alt="handwriting" /></div>
          </div>
          <div class="compareBox">
            <div class="compareTitle">正确写法</div>
            <div id="correctCharBox" class="charWrap"></div>
          </div>
        </div>
        <div class="row" style="margin-top:10px;">
          <button class="primary" id="manualRightBtn">我写对了</button>
          <button id="manualWrongBtn">我写错了</button>
        </div>
      </div>

      <div id="dontKnowStage" class="hidden" style="margin-top:14px;">
        <div class="muted">正确写法</div>
        <div id="dontKnowChar" class="target" style="margin-top:8px;">字</div>
        <div class="row" style="margin-top:10px;">
          <button class="primary" id="nextAfterDontKnowBtn">下一题</button>
        </div>
      </div>

      <div id="resultFlash" style="margin-top:10px;"></div>
      <div id="summary" style="margin-top:16px;"></div>
    </div>
  </div>

  <div id="toast"></div>

    function loadWrongBook() {
      try {
        const data = JSON.parse(localStorage.getItem(WRONGBOOK_KEY) || "[]");
        return Array.isArray(data) ? data : [];
      } catch (e) {
        return [];
      }
    }

    function saveWrongBook(items) {
      localStorage.setItem(WRONGBOOK_KEY, JSON.stringify(Array.isArray(items) ? items : []));
      renderWrongBookSummary();
    }

    function wrongBookKeyOf(char, itemText) {
      return `${char}|||${itemText}`;
    }

    function updateWrongBook(char, itemText, result) {
      if (!char || !itemText) return;
      const items = loadWrongBook();
      const key = wrongBookKeyOf(char, itemText);
      const now = Date.now();
      const idx = items.findIndex(x => wrongBookKeyOf(x.char, x.itemText) === key);
      if (idx < 0) {
        if (result !== "wrong") return;
        items.push({
          char,
          itemText,
          correctStreak: 0,
          totalRight: 0,
          totalWrong: 1,
          addedAt: now,
          updatedAt: now
        });
        saveWrongBook(items);
        return;
      }
      const entry = items[idx];
      entry.updatedAt = now;
      if (result === "wrong") {
        entry.totalWrong = Number(entry.totalWrong || 0) + 1;
        entry.correctStreak = 0;
      } else if (result === "right") {
        entry.totalRight = Number(entry.totalRight || 0) + 1;
        entry.correctStreak = Number(entry.correctStreak || 0) + 1;
        if (entry.correctStreak >= 3) {
          items.splice(idx, 1);
          saveWrongBook(items);
          return;
        }
      }
      saveWrongBook(items);
    }

      const items = loadWrongBook();
      if (!items.length) {
        el.wrongbookPanel.innerHTML = '<div class="muted">错题本目前是空的。</div>';

        </div>
      `).join('');
    }

      const willShow = el.wrongbookPanel.classList.contains('hidden');

      let n = Number(el.wrongbookCountInput.value);
      if (!Number.isInteger(n) || n < 1) n = 20;
      el.wrongbookCountInput.value = String(n);
      const pool = items.slice();
      for (let i = pool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [pool[i], pool[j]] = [pool[j], pool[i]];
      }
      const selected = pool.slice(0, Math.min(n, pool.length)).map((item, idx) => ({
        id: `wb-${idx}-${item.char}-${item.itemText}`,
        lineNo: 0,
        lineText: item.itemText,
        targetChar: item.char,
        charIndex: 0,
        fromWrongBook: true
      }));
      startPractice(selected, el.input.value || '', 'wrongbook');

      const label = !isPractice ? "模式：准备" : (state.practiceType === "wrongbook" ? "模式：错题本练习" : (state.practiceType === "lastwrong" ? "模式：上次错题练习" : "模式：练习中"));
      el.modePill.textContent = label;
      if (isPractice) {
        enterFullscreen();
      } else {
        if (isInFullscreen()) exitFullscreen();
      }
      updateFullscreenBtn(isPractice);
      persistIfNeeded();
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
    }

    function normalizeText(t) {
      return String(t || "").replace(/\r\n/g, "\n").trim();
    }

    function isHan(ch) {
      const cp = ch.codePointAt(0);
      return (cp >= 0x3400 && cp <= 0x4DBF)   // CJK Extension A
          || (cp >= 0x4E00 && cp <= 0x9FFF)   // CJK Unified
          || (cp >= 0xF900 && cp <= 0xFAFF)   // CJK Compatibility
          || (cp >= 0x20000 && cp <= 0x3134F); // Extensions B–I
    }

    function hanChars(text) {
      return Array.from(String(text || "")).filter(isHan);
    }

    function speak(text) {
      if (!("speechSynthesis" in window)) {
        alert("这个浏览器不支持朗读。建议用 Chrome / Edge / Safari。");
        return;
      }
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = "zh-CN";
      u.rate = Number(el.rate.value);
      u.pitch = Number(el.pitch.value);
      window.speechSynthesis.speak(u);
    }

    function getSpeakText(task) {
      return `${task.lineText}，请写${task.targetChar}`;
    }

    function parseSource(text) {
      const src = normalizeText(text);
      const lines = src ? src.split(/\n+/) : [];
      const warnings = [];
      const tasks = [];
      const normalizedLines = [];

      lines.forEach((raw, i) => {
        const lineNo = i + 1;
        const line = raw.trim();
        if (!line) return;

        let textPart = line;
        let indexPart = "";
        const m = line.match(/^(.*?)(?:\s+(\d+(?:\s*,\s*\d+)*))?$/);
        if (m) {
          textPart = (m[1] || "").trim();
          indexPart = (m[2] || "").trim();
        }

        const chars = hanChars(textPart);
        if (!chars.length) {
          warnings.push(`第 ${lineNo} 行没有可练习的中文内容：${escapeHtml(line)}`);
          return;
        }

        let indexes;
        if (indexPart) {
          indexes = Array.from(new Set(indexPart.split(",").map(x => Number(String(x).trim())).filter(n => Number.isInteger(n) && n >= 1)));
          const valid = indexes.filter(n => n <= chars.length);
          const ignored = indexes.filter(n => n > chars.length);
          if (ignored.length) {
            warnings.push(`第 ${lineNo} 行超出范围的序号已忽略：${ignored.join(", ")}`);
          }
          indexes = valid;
          if (!indexes.length) {
            warnings.push(`第 ${lineNo} 行指定序号全部无效，因此这一行不会进入练习。`);
          }
        } else {
          indexes = chars.map((_, idx) => idx + 1);
        }

        normalizedLines.push({
          lineNo,
          raw: line,
          textPart,
          indexes: indexes.slice(),
          totalChars: chars.length
        });

        indexes.forEach(pos => {
          tasks.push({
            id: `${lineNo}-${pos}-${chars[pos - 1]}`,
            lineNo,
            lineText: textPart,
            targetChar: chars[pos - 1],
            charIndex: pos
          });
        });
      });

      return { src, lines: normalizedLines, tasks, warnings };
    }

    function renderFormatCheck() {
      const parsed = parseSource(el.input.value);
      const linesHtml = parsed.lines.length
        ? `<ul>${parsed.lines.map(item => {
            const previewTargets = item.indexes.map(i => hanChars(item.textPart)[i - 1]).filter(Boolean).join("、");
            return `<li>第 ${item.lineNo} 行：${escapeHtml(item.textPart)} → 检查序号 ${item.indexes.join(", ") || "（无）"}${previewTargets ? `（${escapeHtml(previewTargets)}）` : ""}</li>`;
          }).join("")}</ul>`
        : `<div class="muted">没有可用内容。</div>`;

      const warningsHtml = parsed.warnings.length
        ? `<div class="warn" style="margin-top:10px;">格式检查提示：</div><ul>${parsed.warnings.map(w => `<li>${w}</li>`).join("")}</ul>`
        : `<div class="ok" style="margin-top:10px;">格式看起来没有问题。</div>`;

      el.preview.innerHTML = `
        <div class="card" style="margin-top:0;">
          <div>将生成 ${parsed.tasks.length} 个练习项</div>
          ${linesHtml}
          ${warningsHtml}
        </div>
      `;
      return parsed;
    }

    function initPad() {
      padCtx = el.pad.getContext("2d");
      padCtx.lineWidth = 12;
      padCtx.lineCap = "round";
      padCtx.lineJoin = "round";
      padCtx.strokeStyle = "#000";
      padCtx.imageSmoothingEnabled = true;
      clearPad();

      let lastPoint = null; // the actual last pointer position
      let lastMid = null;   // midpoint between the two most recent pointer positions
      let activePointerId = null; // only track one pointer at a time

      // exposed so clearPad and submitOCR can fully reset drawing state
      const resetDrawingState = () => {
        drawing = false;
        lastPoint = null;
        lastMid = null;
        activePointerId = null;
      };
      el.pad._resetDrawingState = resetDrawingState;

      const getPos = (e) => {
        const rect = el.pad.getBoundingClientRect();
        const pt = e.touches ? e.touches[0] : e;
        const scaleX = el.pad.width / rect.width;
        const scaleY = el.pad.height / rect.height;
        const x = Math.max(0, Math.min(el.pad.width,  (pt.clientX - rect.left) * scaleX));
        const y = Math.max(0, Math.min(el.pad.height, (pt.clientY - rect.top)  * scaleY));
        return { x, y };
      };

      const start = (e) => {
        // ignore additional fingers/pointers while already drawing
        if (drawing) return;
        drawing = true;
        activePointerId = e.pointerId ?? null;
        const p = getPos(e);
        lastPoint = p;
        lastMid = p;
        padCtx.beginPath();
        padCtx.arc(p.x, p.y, padCtx.lineWidth / 2, 0, Math.PI * 2);
        padCtx.fillStyle = "#000";
        padCtx.fill();
        if (e.pointerId != null && el.pad.setPointerCapture) {
          try { el.pad.setPointerCapture(e.pointerId); } catch (_) {}
        }
        e.preventDefault?.();
      };

      const move = (e) => {
        // only respond to the pointer that started the stroke
        if (!drawing || !lastPoint || !lastMid) return;
        if (activePointerId !== null && e.pointerId !== activePointerId) return;
        const p = getPos(e);
        const currentMid = { x: (lastPoint.x + p.x) / 2, y: (lastPoint.y + p.y) / 2 };
        padCtx.beginPath();
        padCtx.moveTo(lastMid.x, lastMid.y);
        padCtx.quadraticCurveTo(lastPoint.x, lastPoint.y, currentMid.x, currentMid.y);
        padCtx.stroke();
        lastMid = currentMid;
        lastPoint = p;
        // only block page scroll while the writing stage is actually visible
        if (!el.writingStage.classList.contains("hidden")) {
          e.preventDefault?.();
        }
      };

      const end = (e) => {
        if (!drawing) return;
        // only end on the pointer that started the stroke
        if (activePointerId !== null && e.pointerId !== activePointerId) return;
        // No closing segment needed — the curve in move() already ends at lastMid,
        // which is the natural visual end of the stroke. Drawing to lastPoint
        // would overshoot, making strokes feel longer than intended.
        if (e.pointerId != null && el.pad.releasePointerCapture) {
          try { el.pad.releasePointerCapture(e.pointerId); } catch (_) {}
        }
        drawing = false;
        lastPoint = null;
        lastMid = null;
        activePointerId = null;
      };

      el.pad.addEventListener("pointerdown", start);
      el.pad.addEventListener("pointermove", move);
      el.pad.addEventListener("pointerup", end);
      el.pad.addEventListener("pointercancel", end);

      // Safety net: if the finger is released anywhere outside the canvas
      // (e.g. on the submit button), the canvas pointerup never fires.
      // This document-level handler ensures drawing always ends cleanly.
      document.addEventListener("pointerup", (e) => {
        if (drawing) end(e);
      });
      document.addEventListener("pointercancel", (e) => {
        if (drawing) end(e);
      });
    }

    function clearPad() {
      if (el.pad._resetDrawingState) el.pad._resetDrawingState();
      padCtx.clearRect(0, 0, el.pad.width, el.pad.height);
      padCtx.fillStyle = "#fff";
      padCtx.fillRect(0, 0, el.pad.width, el.pad.height);
      padCtx.strokeStyle = "#000";
      lastPreparedImage = "";
      el.ocrStatus.textContent = "";
    }

    function preparePadImage() {
      const src = el.pad;
      const w = src.width, h = src.height;
      const srcCtx = src.getContext("2d");
      const img = srcCtx.getImageData(0, 0, w, h);
      const d = img.data;

      let minX = w, minY = h, maxX = -1, maxY = -1;
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 4;
          const r = d[i], g = d[i+1], b = d[i+2], a = d[i+3];
          if (a > 0 && (r < 245 || g < 245 || b < 245)) {
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          }
        }
      }

      if (maxX < 0) return null;

      const pad = 24;
      minX = Math.max(0, minX - pad);
      minY = Math.max(0, minY - pad);
      maxX = Math.min(w - 1, maxX + pad);
      maxY = Math.min(h - 1, maxY + pad);

      const cw = maxX - minX + 1;
      const ch = maxY - minY + 1;

      const crop = document.createElement("canvas");
      crop.width = cw;
      crop.height = ch;
      const cctx = crop.getContext("2d");
      cctx.drawImage(src, minX, minY, cw, ch, 0, 0, cw, ch);

      const cimg = cctx.getImageData(0, 0, cw, ch);
      const cd = cimg.data;
      for (let i = 0; i < cd.length; i += 4) {
        const r = cd[i], g = cd[i+1], b = cd[i+2], a = cd[i+3];
        const gray = (r * 0.299 + g * 0.587 + b * 0.114);
        const isInk = a > 0 && gray < 240;
        const v = isInk ? 0 : 255;
        cd[i] = v; cd[i+1] = v; cd[i+2] = v; cd[i+3] = 255;
      }
      cctx.putImageData(cimg, 0, 0);

      const target = 1024;
      const out = document.createElement("canvas");
      out.width = target;
      out.height = target;
      const octx = out.getContext("2d");
      octx.fillStyle = "#fff";
      octx.fillRect(0, 0, target, target);

      const scale = Math.min((target * 0.88) / cw, (target * 0.88) / ch);
      const dw = cw * scale;
      const dh = ch * scale;
      const dx = (target - dw) / 2;
      const dy = (target - dh) / 2;

      octx.imageSmoothingEnabled = false;
      octx.drawImage(crop, 0, 0, cw, ch, dx, dy, dw, dh);

      lastPreparedImage = out.toDataURL("image/png");
      return {
        dataUrl: lastPreparedImage,
        base64: lastPreparedImage.split(",")[1]
      };
    }

    function firstHanChar(s) {
      const m = String(s || "").match(/[\u4E00-\u9FFF]/);
      return m ? m[0] : "";
    }

    async function recognizeWithGoogleVision(base64) {
      if (!GOOGLE_VISION_API_KEY) throw new Error("Missing Vision API key");
      const body = {
        requests: [{
          image: { content: base64 },
          features: [{ type: "DOCUMENT_TEXT_DETECTION" }],
          imageContext: { languageHints: ["zh-Hans", "zh"] }
        }]
      };

      const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${encodeURIComponent(GOOGLE_VISION_API_KEY)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
      });
      if (!res.ok) {
        const txt = await res.text().catch(() => "");
        throw new Error(`Vision API error: ${res.status} ${txt}`);
      }
      const data = await res.json();
      const rawText = String(data?.responses?.[0]?.fullTextAnnotation?.text || data?.responses?.[0]?.textAnnotations?.[0]?.description || "").trim();
      return rawText.replace(/[^\u3400-\u9FFF]/g, "");
    }

    function currentTask() {
      return state.tasks[state.idx] || null;
    }

    function hasRetryContext() {
      return !!(state && state.retryContext && state.retryContext.baseResult);
    }

    function updateRetryHint() {
      if (!el.retryHint || !el.writingHint) return;
      if (hasRetryContext()) {
        const label = state.retryContext.baseResult === "dontKnow" ? "这题先记为“我不会”。现在请重试，写对后再进入下一题。" : "这题先记为“写错了”。现在请重试，写对后再进入下一题。";
        el.retryHint.textContent = label;
        el.retryHint.classList.remove("hidden");
        el.writingHint.textContent = "请重试：写一个字，写大一点、尽量居中。";
      } else {
        el.retryHint.textContent = "";
        el.retryHint.classList.add("hidden");
        el.writingHint.textContent = "请写一个字，写大一点、尽量居中。";
      }
    }

    function enterRetryMode(baseResult, extra = {}) {
      const task = currentTask();
      if (!task) return;
      state.retryContext = {
        baseResult,
        originalMethod: extra.originalMethod || "",
        originalRecognized: extra.originalRecognized || "",
        originalImage: extra.originalImage || ""
      };
      state.pendingManual = null;
      el.reviewImage.src = "";
      el.correctCharBox.textContent = "";
      el.dontKnowChar.textContent = task.targetChar;
      el.ocrStatus.textContent = baseResult === "dontKnow" ? "先看正确写法，再重试，直到写对为止。" : "请根据正确写法重试，直到写对为止。";
      showFlash(baseResult === "dontKnow"
        ? `<div class="warn">这题先记为“不会”。请看正确写法，然后重试到写对为止。</div>`
        : `<div class="bad">这题先记为“写错了”。请重试到写对为止。</div>`);
      clearPad();
      setFlow("actions");
      persistIfNeeded();
    }

    function setFlow(flow) {
      state.currentFlow = flow;
      const showMain = flow === "actions";
      el.actionStage.classList.toggle("hidden", !showMain);
      el.writingStage.classList.toggle("hidden", !showMain);
      el.manualStage.classList.toggle("hidden", flow !== "manual");
      el.dontKnowStage.classList.toggle("hidden", flow !== "dontKnow");
      updateRetryHint();
      refreshActionButtons();
      persistIfNeeded();
    }

    function updateStreak() {
      if (el.streak) {
        el.streak.textContent = `连胜：${Number(state.streak || 0)}`;
      }
    }

    function refreshActionButtons() {
      const busy = !!(ocrInFlight || transitionLock || state.advancePending);
      if (el.submitOCR) el.submitOCR.disabled = busy;
      if (el.manualRightBtn) el.manualRightBtn.disabled = busy;
      if (el.manualWrongBtn) el.manualWrongBtn.disabled = busy;
      if (el.nextAfterDontKnowBtn) el.nextAfterDontKnowBtn.disabled = busy;
      if (el.dontKnowBtn) el.dontKnowBtn.disabled = busy || hasRetryContext();
    }

    function setTransitionLock(locked) {
      transitionLock = !!locked;
      refreshActionButtons();
    }

    function setSubmitBusy(busy) {
      ocrInFlight = !!busy;
      refreshActionButtons();
    }

    function isUiLocked() {
      return !!(ocrInFlight || transitionLock || state.advancePending);
    }

    function updateContinueButton() {
      if (!el.continueBtn) return;
      const hasSaved = !!(
        savedPracticeSnapshot &&
        savedPracticeSnapshot.state &&
        Array.isArray(savedPracticeSnapshot.state.tasks) &&
        savedPracticeSnapshot.state.tasks.length &&
        !savedPracticeSnapshot.state.finished &&
        Number(savedPracticeSnapshot.state.idx || 0) < savedPracticeSnapshot.state.tasks.length
      );
      el.continueBtn.disabled = !hasSaved;
    }

    function resumeLoadedPractice() {
      if (!savedPracticeSnapshot || !savedPracticeSnapshot.state) {
        toast("没有可继续的练习");
        return;
      }
      state = savedPracticeSnapshot.state;
      state.advancePending = false;
      setMode(true);
      el.summary.innerHTML = "";
      el.resultFlash.innerHTML = "";
      setTransitionLock(false);
      setSubmitBusy(false);
      if (state.finished) {
        finishPractice();
        return;
      }
      const task = currentTask();
      if (!task) {
        toast("没有可继续的练习");
        return;
      }
      el.progress.textContent = `进度：${state.idx + 1} / ${state.tasks.length}`;
      updateScore();
      updateStreak();
      el.ocrStatus.textContent = "";
      if (state.currentFlow === "manual" && state.pendingManual) {
        el.reviewImage.src = state.pendingManual.image || "";
        el.correctCharBox.textContent = task.targetChar;
      } else {
        el.reviewImage.src = "";
        el.correctCharBox.textContent = "";
      }
      if (state.currentFlow === "dontKnow") {
        el.dontKnowChar.textContent = task.targetChar;
        el.nextAfterDontKnowBtn.textContent = hasRetryContext() ? "开始重试" : "下一题";
      } else {
        el.nextAfterDontKnowBtn.textContent = hasRetryContext() ? "开始重试" : "下一题";
      }
      updateRetryHint();
      setFlow(state.currentFlow || "actions");
    }

    function updateScore() {
      const done = state.results.length;
      const correct = state.results.filter(r => r.result === "correct").length;
      const wrong = state.results.filter(r => r.result === "wrong").length;
      const unknown = state.results.filter(r => r.result === "dontKnow").length;
      el.score.textContent = `正确：${correct} / 错：${wrong} / 不会：${unknown}`;
      updateStreak();
    }

    function renderTask() {
      const task = currentTask();
      if (!task) return;

      state.advancePending = false;
      clearTimeout(advanceTimer);
      clearTimeout(watchdogTimer);
      setTransitionLock(false);
      setSubmitBusy(false);
      el.summary.innerHTML = "";
      el.progress.textContent = `进度：${state.idx + 1} / ${state.tasks.length}`;
      el.resultFlash.innerHTML = "";
      el.ocrStatus.textContent = "";
      el.reviewImage.src = "";
      el.correctCharBox.textContent = "";
      el.dontKnowChar.textContent = task.targetChar;
      el.nextAfterDontKnowBtn.textContent = "开始重试";
      state.pendingManual = null;
      state.retryContext = null;
      updateRetryHint();
      setFlow("actions");
      clearPad();
      updateScore();
      speak(getSpeakText(task));
      persistIfNeeded();
    }

    function startPractice(withTasks, sourceText, practiceType = "normal") {
      const tasks = (withTasks || []).map(t => ({ ...t }));
      if (!tasks.length) {
        toast("没有可练习的内容");
        return;
      }
      state = {
        sourceText: sourceText,
        allTasks: practiceType === "wrongbook" ? tasks.map(t => ({ ...t })) : parseSource(sourceText).tasks,
        tasks,
        idx: 0,
        results: [],
        finished: false,
        currentFlow: "actions",
        pendingManual: null,
        streak: 0,
        practiceType,
        advancePending: false
      };
      el.summary.innerHTML = "";
      setMode(true);
      renderTask();
    }

    function beginFromInput() {
      const parsed = renderFormatCheck();
      if (!parsed.tasks.length) {
        alert("没有可练习的内容。");
        return;
      }
      startPractice(parsed.tasks, parsed.src);
    }

    function replayCurrent() {
      const task = currentTask();
      if (!task || isUiLocked()) return;
      speak(getSpeakText(task));
    }


    function speakImmediate(text, onEnd) {
      if (!("speechSynthesis" in window)) {
        if (typeof onEnd === "function") onEnd();
        return;
      }

      try {
        window.speechSynthesis.cancel();
      } catch (e) {}

      const u = new SpeechSynthesisUtterance(text);
      u.lang = "zh-CN";
      u.rate = Number(el.rate.value);
      u.pitch = Number(el.pitch.value);

      if (typeof onEnd === "function") {
        let called = false;
        const estimatedMs = Math.max(1200, Math.ceil(String(text || "").length * (750 / Math.max(0.6, Number(el.rate.value) || 1))));
        const fallbackMs = Math.min(12000, estimatedMs + 2500);
        const done = () => {
          if (called) return;
          called = true;
          onEnd();
        };
        const timer = setTimeout(done, fallbackMs);
        u.onend = () => {
          clearTimeout(timer);
          done();
        };
        u.onerror = () => {
          clearTimeout(timer);
          done();
        };
      }

      window.speechSynthesis.speak(u);
    }

    function flashPadSuccess() {
      el.pad.classList.remove("padSuccessFlash");
      void el.pad.offsetWidth;
      el.pad.classList.add("padSuccessFlash");
      setTimeout(() => el.pad.classList.remove("padSuccessFlash"), 600);
    }

    function getSuccessFeedback() {
      const s = state.streak || 0;
      if (s === 3) {
        return { text: "3连胜！你太棒了！", speech: "3连胜！你太棒了！" };
      }
      if (s >= 50 && s % 50 === 0) {
        const msg = `${s}连胜！你是超级江小毛！爸爸妈妈爱你哦！`;
        return { text: msg, speech: msg };
      }
      if (s >= 10 && s % 10 === 0) {
        return { text: `${s}连胜！你是最聪明的卡皮巴拉！`, speech: `${s}连胜！你是最聪明的卡皮巴拉！` };
      }
      return { text: "对了 ✅", speech: "对了" };
    }

    function showFlash(html) {
      el.resultFlash.innerHTML = html;
    }

    function recordAndAdvance(result, extra = {}) {
      const task = currentTask();
      if (!task || state.advancePending) return;
      state.advancePending = true;
      setTransitionLock(true);
      setSubmitBusy(true);

      if (result === "correct") {
        if (!extra.noStreak) {
          state.streak = (state.streak || 0) + 1;
        }
      } else {
        state.streak = 0;
      }

      if (result === "correct") {
        updateWrongBook(task.targetChar, task.lineText, "right");
      } else if (result === "wrong" || result === "dontKnow") {
        updateWrongBook(task.targetChar, task.lineText, "wrong");
      }

      state.results.push({
        taskId: task.id,
        lineText: task.lineText,
        targetChar: task.targetChar,
        charIndex: task.charIndex,
        lineNo: task.lineNo,
        result,
        streakAtThatMoment: state.streak,
        ...extra
      });
      persistIfNeeded();

      const goNext = () => {
        if (!state.advancePending) return;
        if (state.idx >= state.tasks.length - 1) {
          finishPractice();
        } else {
          state.idx += 1;
          renderTask();
        }
      };

      const delay = Number.isFinite(extra.advanceDelayMs) ? extra.advanceDelayMs : (result === "correct" ? 650 : 220);
      clearTimeout(advanceTimer);
      clearTimeout(watchdogTimer);
      advanceTimer = setTimeout(goNext, delay);
      watchdogTimer = setTimeout(goNext, Math.max(delay + 2200, 3200));
    }

    async function submitOCR() {
      const task = currentTask();
      if (!task || isUiLocked()) return;

      // Ensure drawing state is always fully reset when submitting,
      // in case pointerup fired on the button instead of the canvas.
      if (el.pad._resetDrawingState) el.pad._resetDrawingState();

      const prepared = preparePadImage();
      if (!prepared) {
        toast("请先在手写板上写字");
        return;
      }

      setSubmitBusy(true);
      el.ocrStatus.textContent = "识别中...";
      try {
        const recognized = await recognizeWithGoogleVision(prepared.base64);
        const allHan = (recognized.match(/[\u4E00-\u9FFF]/g) || []);
        const exact = firstHanChar(recognized) === task.targetChar;

        if (exact) {
          el.ocrStatus.textContent = `OCR 识别：${allHan.join("") || "（无汉字）"}，判断为正确。`;
          const retryContext = state.retryContext ? { ...state.retryContext } : null;
          let feedbackText, feedbackSpeech;
          if (retryContext) {
            feedbackText = "对了 ✅";
            feedbackSpeech = "对了";
          } else {
            state.streak = (state.streak || 0) + 1;
            const feedback = getSuccessFeedback();
            feedbackText = feedback.text;
            feedbackSpeech = feedback.speech;
            state.streak -= 1;
          }
          showFlash(`<div class="ok">${feedbackText}</div>`);
          flashPadSuccess();
          updateStreak();
          let committed = false;
          const commit = () => {
            if (committed) return;
            committed = true;
            if (retryContext) {
              state.retryContext = null;
              recordAndAdvance(retryContext.baseResult, {
                method: retryContext.originalMethod || "retry",
                retryResolved: true,
                retryMethod: "ocr",
                recognized: retryContext.originalRecognized || recognized,
                image: retryContext.originalImage || prepared.dataUrl,
                retryRecognized: recognized,
                retryImage: prepared.dataUrl,
                noStreak: true,
                advanceDelayMs: 380
              });
            } else {
              recordAndAdvance("correct", {
                method: "ocr",
                recognized,
                image: prepared.dataUrl,
                advanceDelayMs: 380
              });
            }
          };
          const commitWatchdog = setTimeout(commit, 5000);
          try {
            speakImmediate(feedbackSpeech, () => {
              clearTimeout(commitWatchdog);
              commit();
            });
          } catch (e) {
            clearTimeout(commitWatchdog);
            commit();
          }
          return;
        }

        el.ocrStatus.textContent = `OCR 识别：${allHan.join("") || "（无汉字）"}，无法确认正确，进入手动检查。`;
        state.pendingManual = {
          image: prepared.dataUrl,
          recognized,
          task
        };
        el.reviewImage.src = prepared.dataUrl;
        el.correctCharBox.textContent = task.targetChar;
        setFlow("manual");
        setSubmitBusy(false);
        setTransitionLock(false);
        persistIfNeeded();
      } catch (e) {
        el.ocrStatus.textContent = "识别失败，请手动检查。";
        state.pendingManual = {
          image: prepared.dataUrl,
          recognized: "",
          task
        };
        el.reviewImage.src = prepared.dataUrl;
        el.correctCharBox.textContent = task.targetChar;
        setFlow("manual");
        setSubmitBusy(false);
        setTransitionLock(false);
        persistIfNeeded();
      }
    }

    function manualMarkRight() {
      const pending = state.pendingManual;
      if (!pending || isUiLocked()) return;
      setTransitionLock(true);
      const retryContext = state.retryContext ? { ...state.retryContext } : null;
      showFlash(`<div class="ok">已确认 ✅</div>`);
      flashPadSuccess();
      let committed = false;
      const commit = () => {
        if (committed) return;
        committed = true;
        state.pendingManual = null;
        if (retryContext) {
          state.retryContext = null;
          recordAndAdvance(retryContext.baseResult, {
            method: retryContext.originalMethod || "retry",
            retryResolved: true,
            retryMethod: "manual",
            recognized: retryContext.originalRecognized || pending.recognized || "",
            image: retryContext.originalImage || pending.image,
            retryRecognized: pending.recognized || "",
            retryImage: pending.image,
            noStreak: true,
            advanceDelayMs: 380
          });
        } else {
          recordAndAdvance("correct", {
            method: "manual",
            recognized: pending.recognized || "",
            image: pending.image,
            noStreak: true,
            advanceDelayMs: 380
          });
        }
      };
      const commitWatchdog = setTimeout(commit, 4000);
      try {
        speakImmediate("已确认", () => {
          clearTimeout(commitWatchdog);
          commit();
        });
      } catch (e) {
        clearTimeout(commitWatchdog);
        commit();
      }
    }

    function manualMarkWrong() {
      const pending = state.pendingManual;
      if (!pending || isUiLocked()) return;
      setTransitionLock(true);
      enterRetryMode("wrong", {
        originalMethod: "manual",
        originalRecognized: pending.recognized || "",
        originalImage: pending.image || ""
      });
      setTransitionLock(false);
    }

    function markDontKnow() {
      const task = currentTask();
      if (!task || hasRetryContext() || isUiLocked()) return;
      setTransitionLock(true);
      el.dontKnowChar.textContent = task.targetChar;
      el.nextAfterDontKnowBtn.textContent = "开始重试";
      setFlow("dontKnow");
      setTransitionLock(false);
      persistIfNeeded();
    }

    function nextAfterDontKnow() {
      const task = currentTask();
      if (!task || isUiLocked()) return;
      setTransitionLock(true);
      enterRetryMode("dontKnow", {
        originalMethod: "dontKnow"
      });
      setTransitionLock(false);
    }

    function finishPractice() {
      state.finished = true;
      if (el.pad._resetDrawingState) el.pad._resetDrawingState();

      // Save a stripped snapshot for "上次总结"
      try {
        const summarySnap = makeStateSafeForStorage(state);
        localStorage.setItem(LS_LAST_SUMMARY, JSON.stringify(summarySnap));
        updateLastSummaryButton();
      } catch (e) {}

      const recomputeSummaryData = () => {
        const total = state.results.length;
        const autoCorrect = state.results.filter(r => r.result === "correct" && r.method !== "manual");
        const manualCorrect = state.results.filter(r => r.result === "correct" && r.method === "manual");
        const wrong = state.results.filter(r => r.result === "wrong");
        const dontKnow = state.results.filter(r => r.result === "dontKnow");
        const correct = autoCorrect.length + manualCorrect.length;
        const pct = total ? Math.round(correct / total * 100) : 0;
        const mistakes = state.results.filter(r => r.result !== "correct");
        const retryTasks = state.tasks.filter(task => mistakes.some(r => r.taskId === task.id));
        return { total, manualCorrect, wrong, dontKnow, correct, pct, retryTasks };
      };

      const buildSimpleList = (items) => {
        if (!items.length) return "";
        return `<ul>${items.map(r => `<li>${escapeHtml(r.lineText)} ${escapeHtml(r.targetChar)}</li>`).join("")}</ul>`;
      };

      const buildManualReview = (items) => {
        if (!items.length) return `<div class="ok" style="margin-top:12px;">没有需要家长改判的项目 ✅</div>`;
        return `
          <div class="summaryList">
            ${items.map(r => `
              <div class="summaryItem">
                <img class="summaryThumb" src="${r.image || ""}" alt="handwriting" />
                <div class="summaryMeta">
                  <div class="summaryChar">${escapeHtml(r.targetChar)}</div>
                  <div class="muted">这题目前记为“写对”。如果其实写错了，可在这里改判。</div>
                  <div style="margin-top:6px;">
                    <button class="revWrong" data-id="${r.taskId}">我写错了</button>
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        `;
      };

      const renderSummary = () => {
        const { total, manualCorrect, wrong, dontKnow, correct, pct, retryTasks } = recomputeSummaryData();
        saveLastWrongTasks(retryTasks);

        el.progress.textContent = `已完成：${total} / ${state.tasks.length}`;
        updateScore();
        el.resultFlash.innerHTML = "";
        el.actionStage.classList.add("hidden");
        el.writingStage.classList.add("hidden");
        el.manualStage.classList.add("hidden");
        el.dontKnowStage.classList.add("hidden");

        el.summary.innerHTML = `
          <div class="card" style="margin:0;">
            <div class="big">总结</div>
            <div class="row" style="margin-top:8px;">
              <span class="pill">总题数：${total}</span>
              <span class="pill ok">正确：${correct}</span>
              <span class="pill bad">写错：${wrong.length}</span>
              <span class="pill warn">不会：${dontKnow.length}</span>
              <span class="pill">正确率：${pct}%</span>
            </div>

            <div style="margin-top:12px;">
              <div class="muted">写错了：</div>
              ${wrong.length ? buildSimpleList(wrong) : `<div class="ok" style="margin-top:8px;">没有写错的字 ✅</div>`}
            </div>

            <div style="margin-top:12px;">
              <div class="muted">我不会：</div>
              ${dontKnow.length ? buildSimpleList(dontKnow) : `<div class="ok" style="margin-top:8px;">没有不会的字 ✅</div>`}
            </div>

            <div style="margin-top:12px;">
              <div class="muted">家长检查（这里只保留“我写错了”改判）：</div>
              ${buildManualReview(manualCorrect)}
            </div>

            <div class="row" style="margin-top:12px;">
              <button class="primary" id="retryAllBtn">从头开始</button>
              <button id="retryWrongBtn" ${retryTasks.length ? "" : "disabled"}>只练习错了的和不会的</button>
            </div>
          </div>
        `;

        const retryAllBtn = $("retryAllBtn");
        const retryWrongBtn = $("retryWrongBtn");

        el.summary.querySelectorAll('.revWrong').forEach(btn => {
          btn.addEventListener('click', () => {
            const targetId = btn.getAttribute('data-id');
            const item = state.results.find(r => r.taskId === targetId && r.result === 'correct' && r.method === 'manual');
            if (!item) return;
            item.result = 'wrong';
            state.streak = 0;
            persistIfNeeded();
            renderSummary();
          });
        });

        if (retryAllBtn) {
          retryAllBtn.addEventListener("click", () => {
            if (state.practiceType === "wrongbook") {
              startWrongBookPractice();
            } else if (state.practiceType === "lastwrong") {
              startLastWrongPractice();
            } else {
              const parsed = parseSource(state.sourceText);
              startPractice(parsed.tasks, state.sourceText);
            }
          });
        }

        if (retryWrongBtn) {
          retryWrongBtn.addEventListener("click", () => {
            const latest = recomputeSummaryData().retryTasks;
            saveLastWrongTasks(latest);
            startPractice(latest, state.sourceText, "retrywrong");
          });
        }
      };

      renderSummary();
      setSubmitBusy(false);
      persistIfNeeded();
    }

    function resetAll() {
      if (!confirm("确定要清空内容和进度吗？")) return;
      state = {
        sourceText: "",
        allTasks: [],
        tasks: [],
        idx: 0,
        results: [],
        finished: false,
        currentFlow: "actions",
        pendingManual: null,
        streak: 0,
        practiceType: "normal",
        advancePending: false
      };
      el.input.value = "";
      el.preview.innerHTML = "";
      el.summary.innerHTML = "";
      el.progress.textContent = "未开始";
      el.score.textContent = "正确：-";
      if (el.streak) el.streak.textContent = "连胜：0";
      localStorage.removeItem(LS_KEY);
      localStorage.removeItem(LS_TEXT);
      savedPracticeSnapshot = null;
      updateContinueButton();
      setSubmitBusy(false);
      setMode(false);
      clearPad();
    }

    function makeStateSafeForStorage(srcState) {
      const safe = JSON.parse(JSON.stringify(srcState || {}));
      if (Array.isArray(safe.results)) {
        safe.results = safe.results.map(r => {
          const item = { ...r };
          const keepImage = item.result === "correct" && item.method === "manual" && !item.retryResolved;
          if (!keepImage) {
            delete item.image;
          }
          delete item.retryImage;
          return item;
        });
      }
      if (safe.pendingManual && safe.pendingManual.task) {
        safe.pendingManual.task = {
          id: safe.pendingManual.task.id,
          lineNo: safe.pendingManual.task.lineNo,
          lineText: safe.pendingManual.task.lineText,
          targetChar: safe.pendingManual.task.targetChar,
          charIndex: safe.pendingManual.task.charIndex
        };
      }
      if (safe.retryContext) {
        delete safe.retryContext.originalImage;
      }
      return safe;
    }

    function persistIfNeeded() {
      try {
        localStorage.setItem(LS_TEXT, el.input.value || "");
      } catch (e) {}

      const buildSnapshot = (safeState) => ({
        state: safeState,
        practice: document.body.classList.contains("practice"),
        remember: true,
        rate: el.rate.value,
        pitch: el.pitch.value,
        wrongbookCountInput: el.wrongbookCountInput.value
      });

      let snapshot = buildSnapshot(state);
      try {
        localStorage.setItem(LS_KEY, JSON.stringify(snapshot));
      } catch (e) {
        try {
          snapshot = buildSnapshot(makeStateSafeForStorage(state));
          localStorage.setItem(LS_KEY, JSON.stringify(snapshot));
          state = snapshot.state;
          toast("练习记录过大，已自动精简保存内容。");
        } catch (e2) {
          console.warn("persist failed", e2);
          toast("本地保存空间不足，本次进度可能无法完整保存。请先继续完成当前题。");
          savedPracticeSnapshot = snapshot;
          updateContinueButton();
          return;
        }
      }
      savedPracticeSnapshot = snapshot;
      updateContinueButton();
    }

    function restoreIfNeeded() {
      setPills();
      const savedText = localStorage.getItem(LS_TEXT);
      if (savedText != null) el.input.value = savedText;

      try {
        const raw = JSON.parse(localStorage.getItem(LS_KEY) || "null");
        if (!raw) {
          updateContinueButton();
          return;
        }
        if (raw.rate) el.rate.value = raw.rate;
        if (raw.pitch) el.pitch.value = raw.pitch;
        if (raw.wrongbookCountInput) el.wrongbookCountInput.value = raw.wrongbookCountInput;
        setPills();

        if (raw.state) {
          savedPracticeSnapshot = raw;
          state = raw.state;
          state.advancePending = false;
          updateScore();
          updateStreak();
        }
      } catch (e) {}
      updateContinueButton();
    }

    if (el.startLastWrongBtn) el.startLastWrongBtn.addEventListener("click", startLastWrongPractice);
    if (el.continueBtn) el.continueBtn.addEventListener("click", resumeLoadedPractice);
    if (el.lastSummaryBtn) el.lastSummaryBtn.addEventListener("click", showLastSummary);
    el.previewBtn.addEventListener("click", renderFormatCheck);
    el.start.addEventListener("click", beginFromInput);
    el.resetAll.addEventListener("click", resetAll);
    el.startWrongbookBtn.addEventListener("click", startWrongBookPractice);
    el.viewWrongbookBtn.addEventListener("click", toggleWrongBookPanel);
    el.clearWrongbookBtn.addEventListener("click", clearWrongBook);
    el.exitPractice.addEventListener("click", () => {
      setMode(false);
      updateContinueButton();
    });
    if (el.fullscreenBtn) {
      el.fullscreenBtn.addEventListener("click", () => {
        if (isInFullscreen()) exitFullscreen();
        else enterFullscreen();
      });
    }

    el.replayBtn.addEventListener("click", replayCurrent);
    el.dontKnowBtn.addEventListener("click", markDontKnow);
    el.clearPad.addEventListener("click", clearPad);
    el.replayWriteBtn.addEventListener("click", replayCurrent);
    el.submitOCR.addEventListener("click", submitOCR);
    el.manualRightBtn.addEventListener("click", manualMarkRight);
    el.manualWrongBtn.addEventListener("click", manualMarkWrong);
    el.nextAfterDontKnowBtn.addEventListener("click", nextAfterDontKnow);
    el.rate.addEventListener("input", () => { setPills(); persistIfNeeded(); });
    el.pitch.addEventListener("input", () => { setPills(); persistIfNeeded(); });

    initPad();
    restoreIfNeeded();
    renderWrongBookSummary();
    setPills();
    updateContinueButton();
    updateLastSummaryButton();
  })();
  </script>
</body>
</html>
